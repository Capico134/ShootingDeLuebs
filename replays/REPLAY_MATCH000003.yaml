scenario:
  - name: "Programm 18 laden: Default"
    action: "call_sm_method"
    wert: ["setProgramm", 18]
    step_time: 300

  - name: "Replay-ID setzen (Rec 3)"
    action: "call_sm_method"
    wert: ["set_replay_match", "Rec 3"]
    step_time: 250

  - name: "Spieler 1 aus Highscore setzen"
    action: "set_sm_attr"
    wert: ["spieler", "Andreas"]
    step_time: 10

  - name: "Spieler 2 aus Highscore setzen"
    action: "set_sm_attr"
